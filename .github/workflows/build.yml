name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      # ====== DEBUG: Tampilkan isi file yang bermasalah ======
      - name: Debug - Show EditorFragment.kt
        run: |
          echo "=== Full file content ==="
          cat app/src/main/java/code/editor/mon/EditorFragment.kt
          echo ""
          echo "=== Line 111 ==="
          sed -n '111p' app/src/main/java/code/editor/mon/EditorFragment.kt

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeSnap-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CodeSnap-release-unsigned
          path: app/build/outputs/apk/release/*.apk